<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6cfc;
      --accent2: #c084fc;
      --text: #f0eeff;
      --muted: #888;
      --error: #f87171;
      --success: #4ade80;
      --input-bg: rgba(255,255,255,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background blobs */
    .blobs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
    }
    .blob1 { width: 500px; height: 500px; background: #7c6cfc; top: -120px; left: -100px; animation: drift1 12s ease-in-out infinite; }
    .blob2 { width: 400px; height: 400px; background: #c084fc; bottom: -100px; right: -80px; animation: drift2 14s ease-in-out infinite; }
    .blob3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift1 10s ease-in-out infinite reverse; }

    @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, 40px); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, -30px); } }

    .card-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }

    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 18px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 700;
      margin-bottom: 6px; line-height: 1.2;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .tabs {
      display: flex; background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 4px;
      margin-bottom: 28px; gap: 4px;
    }
    .tab {
      flex: 1; padding: 9px; border: none;
      background: transparent; color: var(--muted);
      border-radius: 9px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 4px 14px rgba(124,108,252,0.4);
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }

    input {
      width: 100%; padding: 13px 16px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); background: rgba(124,108,252,0.06); box-shadow: 0 0 0 3px rgba(124,108,252,0.12); }
    input::placeholder { color: #444; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: all 0.2s; position: relative; overflow: hidden;
      box-shadow: 0 8px 24px rgba(124,108,252,0.35);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(124,108,252,0.45); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn.loading::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.2);
    }

    .link-row {
      text-align: center; margin-top: 18px;
      font-size: 13px; color: var(--muted);
    }
    .link-row a {
      color: var(--accent2); text-decoration: none; font-weight: 500;
      cursor: pointer;
    }
    .link-row a:hover { text-decoration: underline; }

    .alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px;
      display: none; align-items: center; gap: 8px;
    }
    .alert.show { display: flex; }
    .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }

    /* Dashboard state */
    .dashboard { display: none; }
    .dashboard.active { display: block; animation: cardIn 0.4s ease; }

    .user-avatar {
      width: 56px; height: 56px; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(124,108,252,0.35);
    }
    .welcome { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .user-email { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .info-box {
      background: rgba(124,108,252,0.08); border: 1px solid rgba(124,108,252,0.2);
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .info-box h4 { font-size: 12px; color: var(--accent2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .info-item { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .info-item span:last-child { color: var(--muted); }

    .btn-outline {
      width: 100%; padding: 12px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 12px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-outline:hover { border-color: var(--error); color: var(--error); background: rgba(248,113,113,0.06); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="card-wrap">
  <div class="card" id="authCard">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">AuthFlow</div>
    </div>

    <!-- Alert box -->
    <div class="alert" id="alertBox">
      <span id="alertIcon">⚠️</span>
      <span id="alertMsg"></span>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="loginPanel">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••"/>
      </div>
      <button class="btn" onclick="handleLogin()" id="loginBtn">Sign In</button>
      <div class="link-row">
        <a onclick="switchTab('forgot')">Forgot password?</a>
      </div>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="signupPanel">
      <h2>Create account</h2>
      <p class="subtitle">Join us today, it's free</p>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signupPass" placeholder="Min 6 characters"/>
      </div>
      <button class="btn" onclick="handleSignup()" id="signupBtn">Create Account</button>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="form-panel" id="forgotPanel">
      <h2>Reset password</h2>
      <p class="subtitle">Enter your email to receive a reset link</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com"/>
      </div>
      <button class="btn" onclick="handleForgot()" id="forgotBtn">Send Reset Link</button>
      <div class="link-row">
        <a onclick="switchTab('login')">← Back to login</a>
      </div>
    </div>
  </div>

  <!-- DASHBOARD (shown after login) -->
  <div class="card" id="dashCard" style="display:none;">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">AuthFlow</div>
    </div>
    <div class="user-avatar" id="userAvatar">👤</div>
    <div class="welcome">Hello, <span id="userName">User</span>! 👋</div>
    <div class="user-email" id="userEmailDisplay">user@example.com</div>

    <div class="info-box">
      <h4>Session Info</h4>
      <div class="info-item"><span>Status</span><span>🟢 Authenticated</span></div>
      <div class="info-item"><span>Token</span><span id="tokenDisplay">—</span></div>
      <div class="info-item"><span>Logged in at</span><span id="loginTime">—</span></div>
    </div>

    <button class="btn-outline" onclick="handleLogout()">Sign Out</button>
  </div>
</div>

<script>
  // ── CONFIG ───────────────────────────────────────
  const API = 'https://rollera.onrender.com/api/auth';

  // ── HELPERS ──────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    const icon = document.getElementById('alertIcon');
    const txt = document.getElementById('alertMsg');
    box.className = `alert show ${type}`;
    icon.textContent = type === 'error' ? '⚠️' : '✅';
    txt.textContent = msg;
    setTimeout(() => box.classList.remove('show'), 4000);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = `<span class="spinner"></span> Please wait...`;
    } else {
      btn.innerHTML = btn._orig;
    }
  }

  function saveToken(token) { localStorage.setItem('authToken', token); }
  function getToken() { return localStorage.getItem('authToken'); }
  function clearToken() { localStorage.removeItem('authToken'); }

  // ── TAB SWITCHING ────────────────────────────────
  function switchTab(tab) {
    document.getElementById('alertBox').classList.remove('show');
    ['login','signup','forgot'].forEach(t => {
      document.getElementById(t + 'Panel').classList.toggle('active', t === tab);
    });
    const tabBar = document.querySelectorAll('.tab');
    if (tab === 'login') { tabBar[0].classList.add('active'); tabBar[1].classList.remove('active'); }
    else if (tab === 'signup') { tabBar[1].classList.add('active'); tabBar[0].classList.remove('active'); }
    else { tabBar.forEach(t => t.classList.remove('active')); }

    document.getElementById('tabBar').style.display = tab === 'forgot' ? 'none' : 'flex';
  }

  // ── SHOW DASHBOARD ───────────────────────────────
  function showDashboard(user, token) {
    document.getElementById('authCard').style.display = 'none';
    const dash = document.getElementById('dashCard');
    dash.style.display = 'block';
    dash.style.animation = 'cardIn 0.5s cubic-bezier(0.22,1,0.36,1)';

    document.getElementById('userName').textContent = user.name || 'User';
    document.getElementById('userEmailDisplay').textContent = user.email || '';
    document.getElementById('userAvatar').textContent = (user.name || 'U')[0].toUpperCase();
    document.getElementById('tokenDisplay').textContent = token.slice(0,18) + '…';
    document.getElementById('loginTime').textContent = new Date().toLocaleTimeString();
  }

  function showAuth() {
    document.getElementById('dashCard').style.display = 'none';
    document.getElementById('authCard').style.display = 'block';
    switchTab('login');
  }

  // ── AUTH ACTIONS ─────────────────────────────────
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value;
    if (!email || !password) return showAlert('Please fill in all fields');

    setLoading('loginBtn', true);
    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      saveToken(data.token);
      showDashboard(data.user, data.token);
    } catch(e) {
      showAlert(e.message || 'Login failed');
    } finally { setLoading('loginBtn', false); }
  }

  async function handleSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPass').value;
    if (!name || !email || !password) return showAlert('Please fill in all fields');
    if (password.length < 6) return showAlert('Password must be at least 6 characters');

    setLoading('signupBtn', true);
    try {
      const res = await fetch(`${API}/signup`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!data.success) {
        const errMsg = data.errors ? data.errors[0].msg : data.message;
        throw new Error(errMsg);
      }
      saveToken(data.token);
      showDashboard(data.user, data.token);
    } catch(e) {
      showAlert(e.message || 'Signup failed');
    } finally { setLoading('signupBtn', false); }
  }

  async function handleForgot() {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) return showAlert('Please enter your email');

    setLoading('forgotBtn', true);
    try {
      const res = await fetch(`${API}/forgot-password`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showAlert('Reset link sent! Check your inbox ✉️', 'success');
    } catch(e) {
      showAlert(e.message || 'Something went wrong');
    } finally { setLoading('forgotBtn', false); }
  }

  async function handleLogout() {
    const token = getToken();
    if (token) {
      await fetch(`${API}/logout`, {
        method: 'POST', headers: { Authorization: `Bearer ${token}` }
      }).catch(() => {});
    }
    clearToken();
    showAuth();
  }

  // Auto-login if token exists on page load
  (async () => {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${API}/me`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) showDashboard(data.user, token);
      else clearToken();
    } catch { clearToken(); }
  })();
</script>
</body>
</html>
