<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller - Apna Swad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; max-width: 420px; margin: 0 auto; height: 100vh; position: relative; overflow: hidden; }
        
        .app-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }
        
        .video-container { height: 100vh; width: 100%; position: relative; scroll-snap-align: start; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .video-overlay { position: absolute; bottom: 70px; left: 15px; right: 70px; z-index: 10; }
        .side-actions { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        
        .action-btn { text-align: center; cursor: pointer; }
        .action-icon { font-size: 28px; margin-bottom: 5px; }
        .liked .action-icon { color: #fe2c55; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 420px; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 100; }
        .nav-item { opacity: 0.6; text-align: center; cursor: pointer; font-size: 12px; }
        .nav-item.active { opacity: 1; }

        .section { display: none; height: calc(100vh - 60px); overflow-y: auto; background: #000; padding: 20px; }
        .section.active { display: block; }
        
        .plus-btn { background: linear-gradient(to right, #25f4ee, #fe2c55); padding: 5px 15px; border-radius: 8px; font-weight: bold; color: #000; }

        /* --- नया एनीमेशन यहाँ है --- */
        @keyframes flyUp {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; margin-top: -100px; }
        }
    </style>
</head>
<body>

    <div class="top-header" id="topHeader">
        <div style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100;">
            <span style="font-weight: bold; border-bottom: 2px solid white;">Following</span>
            <span style="opacity: 0.7;">For You</span>
        </div>
    </div>

    <div id="home" class="app-container section active">
        <div class="video-container">
            <video loop onclick="togglePlay(this)">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-dancing-under-neon-lights-34405-large.mp4" type="video/mp4">
            </video>
            <div class="side-actions">
                <div class="action-btn" onclick="this.classList.toggle('liked')">
                    <div class="action-icon">❤️</div>
                    <span>245K</span>
                </div>
                <div class="action-btn">
                    <div class="action-icon">💬</div>
                    <span>1.2K</span>
                </div>
            </div>
            <div class="video-overlay">
                <h3>@rahul_official</h3>
                <p>आज का डांस धमाका! 💃 #dance #viral</p>
            </div>
        </div>
        <div class="video-container">
            <video loop onclick="togglePlay(this)">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-young-man-skating-with-his-skateboard-at-night-41525-large.mp4" type="video/mp4">
            </video>
            <div class="video-overlay">
                <h3>@skater_boy</h3>
                <p>Night vibes and skating 🛹✨</p>
            </div>
        </div>
    </div>

    <div id="discover" class="section">
        <h2>Trending Topics</h2>
        <div style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: #222; padding: 20px; border-radius: 10px;">#CookingIndia</div>
            <div style="background: #222; padding: 20px; border-radius: 10px;">#ComedyNight</div>
        </div>
    </div>

    <div id="profile" class="section">
        <div style="text-align: center; margin-top: 20px;">
            <div style="width: 100px; height: 100px; background: #fe2c55; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px;">R</div>
            <h2 style="margin-top: 15px;">@rahul_official</h2>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSection('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="showSection('discover')">🔍<br>Discover</div>
        <div class="plus-btn">+</div>
        <div class="nav-item">📥<br>Inbox</div>
        <div class="nav-item" onclick="showSection('profile')">👤<br>Profile</div>
    </div>

    <script>
        // 1. Double Click Like Logic (नया वाला)
        document.querySelectorAll('.video-container').forEach(container => {
            container.addEventListener('dblclick', function(e) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = `${e.clientX - 50}px`;
                heart.style.top = `${e.clientY - 50}px`;
                heart.style.fontSize = '80px';
                heart.style.pointerEvents = 'none';
                heart.style.animation = 'flyUp 0.8s ease-out forwards';
                heart.style.zIndex = '1000';
                
                this.appendChild(heart);

                // साइड वाले लाइक बटन को भी एक्टिवेट कर दो
                const likeBtn = this.querySelector('.action-btn');
                if(likeBtn) likeBtn.classList.add('liked');
                
                setTimeout(() => heart.remove(), 800);
            });
        });

        // 2. Section Switching
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
            document.getElementById('topHeader').style.display = (sectionId === 'home') ? 'block' : 'none';
            if(sectionId !== 'home') {
                document.querySelectorAll('video').forEach(v => v.pause());
            }
        }

        // 3. Play/Pause
        function togglePlay(video) {
            video.paused ? video.play() : video.pause();
        }

        // 4. Autoplay on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-container').forEach(container => {
            observer.observe(container);
        });
    </script>
</body>
</html>
