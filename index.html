<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{margin:0;background:#000;color:#fff;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden;}
        #mainHeader {padding:15px; text-align:center; background: #000; border-bottom: 0.5px solid #262626; font-size:24px; font-weight:bold; position: sticky; top: 0; z-index: 100;}
        #auth {padding: 20px; max-width: 400px; margin: auto; display: block;}
        input {width:100%; padding:12px; margin-top:10px; border-radius:5px; border: 0.5px solid #363636; background:#121212; color:#fff; box-sizing:border-box;}
        button {width:100%; padding:10px; margin-top:15px; border-radius:8px; border:none; background:#0095f6; color:#fff; font-weight:bold; cursor:pointer;}
        
        /* App Container */
        #app { background: #000; min-height: 100vh; padding-bottom: 70px; display: none; }
        .story-container { display: flex; overflow-x: auto; padding: 15px 10px; border-bottom: 0.5px solid #262626; gap: 12px; scrollbar-width: none; }
        .story-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; margin: auto; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid black; object-fit: cover; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .bottom-nav i { font-size: 22px; cursor: pointer; color: #fff; }
        
        /* Modal Fix */
        #uploadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<header id="mainHeader">Rollera</header>

<div id="auth">
    <h1 style="text-align: center; font-family: 'Brush Script MT', cursive; font-size: 45px; margin-bottom: 30px;">Rollera</h1>
    <input id="login-email" placeholder="Email (Try any name for test)">
    <button onclick="handleLogin()">Login / Enter App</button>
</div>

<div id="app">
    <div id="homeView">
        <div class="story-container">
            <div class="story-wrapper" style="text-align:center;">
                <div class="story-ring"><img src="https://i.pravatar.cc/150?u=me"></div>
                <span style="font-size:11px;">Your story</span>
            </div>
        </div>
        <div id="reelsContainer" style="padding:20px; text-align:center;">
            <p style="color:#8e8e8e;">Welcome to Rollera Feed</p>
        </div>
    </div>

    <div id="searchView" style="display:none; padding: 20px;">
        <input type="text" placeholder="Search users..." style="background:#262626;">
    </div>

    <div id="profileView" style="display:none; padding: 20px; text-align:center;">
        <img src="https://i.pravatar.cc/150?u=me" style="width: 80px; border-radius: 50%;">
        <h2 id="profile-username">User Profile</h2>
        <button onclick="location.reload()" style="background:#333; width:auto;">Logout</button>
    </div>

    <div class="bottom-nav">
        <i class="fa-solid fa-house" onclick="showHome()"></i>
        <i class="fa-solid fa-magnifying-glass" onclick="showSearch()"></i>
        <i class="fa-regular fa-square-plus" onclick="openUpload()"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <i class="fa-regular fa-circle-user" onclick="showProfile()"></i>
    </div>
</div>

<div id="uploadModal">
    <div style="background:#262626; padding:20px; border-radius:12px; width:85%; max-width:400px;">
        <h3 style="text-align:center;">Upload New Post</h3>
        <input type="file" id="fileInput" accept="image/*">
        <textarea id="uploadCaption" placeholder="Write a caption..." style="width:100%; height:60px; margin-top:10px; background:#121212; color:white; border:none; padding:10px;"></textarea>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button onclick="closeUpload()" style="background:#444; width:45%;">Cancel</button>
            <button onclick="alert('Starting upload...')" style="background:#0095f6; width:45%;">Share</button>
        </div>
    </div>
</div>

<script>
    // FIX: Variable declaration check
    if (typeof API_URL === 'undefined') { var API_URL = "https://rollera.onrender.com"; }

    // Navigation functions (FAIL-SAFE)
    function showHome() {
        document.getElementById('homeView').style.display = 'block';
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('profileView').style.display = 'none';
    }
    function showSearch() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('searchView').style.display = 'block';
        document.getElementById('profileView').style.display = 'none';
    }
    function showProfile() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('profileView').style.display = 'block';
    }
    function openUpload() { document.getElementById('uploadModal').style.display = 'flex'; }
    function closeUpload() { document.getElementById('uploadModal').style.display = 'none'; }

    // Test Login to see the app
    function handleLogin() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }
</script>
</body>
</html>
