<div class="container" id="auth-container">
    <div id="auth">
        <h3>Welcome to Rollera</h3>

        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>

        <p style="margin-top:15px;">
            Naye ho?
            <a href="javascript:void(0)" onclick="openSignup()" 
               style="color:#ff0050;font-weight:bold;text-decoration:none;">
               Account Banayein
            </a>
        </p>
    </div>
</div>


<!-- SIGNUP MODAL -->
<div id="signupModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSignup()">&times;</span>

        <h2>Join Rollera 🔥</h2>
        <p>Apni details bhariye</p>

        <input id="signup-name" type="text" placeholder="Full Name">
        <input id="signup-age" type="number" placeholder="Age">
        <input id="signup-email" type="email" placeholder="Email">
        <input id="signup-mobile" type="tel" placeholder="Mobile Number">
        <input id="signup-password" type="password" placeholder="Set Password">

        <button id="sendOtpBtn" onclick="sendOtpLogic()">Send OTP</button>

        <!-- OTP SECTION -->
        <div id="otpSection" style="display:none;margin-top:15px;">
            <p style="color:#ff0050;font-size:12px;">
                Mobile par bheja gaya 6-digit OTP daalein
            </p>
            <input id="otpInput" type="text" maxlength="6" 
                   placeholder="Enter OTP"
                   style="text-align:center;letter-spacing:5px;">
            <button onclick="verifyAndSignup()" 
                    style="background:#28a745;">
                Verify & Register
            </button>
        </div>

    </div>
</div>
