<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller - Dashboard</title>
    <link rel="stylesheet" href=".css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div class="dashboard-container" id="dashCard">
        <div class="profile-header">
            <div class="avatar">R</div>
            <h2>Welcome, <span id="userNameDisplay">User</span>!</h2>
            <p>Apna Swad, Apna Style Dashboard</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h3>125K</h3>
                <p>Followers</p>
            </div>
            <div class="stat-box">
                <h3>245</h3>
                <p>Posts</p>
            </div>
        </div>

        <div class="menu-items">
            <button class="menu-btn">My Videos</button>
            <button class="menu-btn">Settings</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // Entrance Animation for Dashboard
        window.onload = () => {
            gsap.from("#dashCard", {
                y: 100,
                opacity: 0,
                duration: 1,
                ease: "power3.out"
            });
        };

        function logout() {
            window.location.href = "/";
        }
    </script>
</body>
</html>
