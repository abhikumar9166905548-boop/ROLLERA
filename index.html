<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Roller - Login & Sign Up</title>
    <link rel="stylesheet" href=".css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="character">💼</div>

    <div class="login-card" id="loginCard">
        <h2 id="formTitle">Roller Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        
        <button id="mainBtn" onclick="submitForm()">Sign In</button>
        
        <p id="toggleText" style="margin-top:15px; cursor:pointer; font-size:13px;" onclick="toggleForm()">
            Naya account chahiye? <b>Sign Up</b>
        </p>
        <p id="msg" style="margin-top:10px; font-weight:bold;"></p>
    </div>

    <script>
        let isLogin = true;

        window.onload = () => {
            const tl = gsap.timeline();
            tl.from("#character", { x: -600, duration: 1 })
              .to("#character", { y: -20, yoyo: true, repeat: 1, duration: 0.2 })
              .to("#character", { opacity: 0, scale: 0, duration: 0.3 })
              .to("#loginCard", { autoAlpha: 1, scale: 1, duration: 0.5, ease: "back.out(1.7)" });
        };

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? "Roller Login" : "Roller Register";
            document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Create Account";
            document.getElementById('toggleText').innerHTML = isLogin ? 
                "Naya account chahiye? <b>Sign Up</b>" : "Pehle se account hai? <b>Login</b>";
            document.getElementById('msg').innerText = "";
        }

        async function submitForm() {
            const endpoint = isLogin ? '/api/login' : '/api/register';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user.value, password: pass.value })
            });
            const data = await res.json();
            
            if(data.success) {
                if(isLogin) window.location.href = "/dashboard";
                else {
                    msg.style.color = "lightgreen";
                    msg.innerText = data.message;
                    setTimeout(toggleForm, 1500);
                }
            } else {
                msg.style.color = "#ff4d4d";
                msg.innerText = data.message;
                gsap.to("#loginCard", { x: 10, duration: 0.1, yoyo: true, repeat: 5 });
            }
        }
    </script>
</body>
</html>
