<div id="auth" class="container">
    <h3>Welcome to Rollera</h3>
    <input id="login-email" type="email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p>Naye ho? <a href="#" onclick="openSignup()" style="color: #ff0050;">Account Banayein</a></p>
</div>

<div id="signupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000;">
    <div class="container" style="margin-top: 50px; background:#111; padding:20px; border-radius:15px; border:1px solid #333;">
        <h3>Create Account</h3>
        <input id="name" type="text" placeholder="Full Name">
        <input id="age" type="number" placeholder="Age">
        <input id="email" type="email" placeholder="Gmail ID">
        <input id="mobile" type="tel" placeholder="Mobile Number">
        <input id="password" type="password" placeholder="Set Password">
        <button onclick="handleSignup()" style="background:#ff0050;">Register Now</button>
        <button onclick="closeSignup()" style="background:#333; margin-top:10px;">Cancel</button>
    </div>
</div>
