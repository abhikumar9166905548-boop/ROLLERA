<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{margin:0;background:#000;color:#fff;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden;}
        #mainHeader {padding:15px; text-align:center; background: #000; border-bottom: 0.5px solid #262626; font-size:24px; font-weight:bold; position: sticky; top: 0; z-index: 100;}
        
        #auth {padding: 20px; max-width: 400px; margin: auto;}
        input {width:100%; padding:12px; margin-top:10px; border-radius:5px; border: 0.5px solid #363636; background:#121212; color:#fff; box-sizing:border-box;}
        button {width:100%; padding:10px; margin-top:15px; border-radius:8px; border:none; background:#0095f6; color:#fff; font-weight:bold; cursor:pointer;}

        /* App Layout Styles */
        #app { background: #000; min-height: 100vh; padding-bottom: 70px; }
        
        /* Stories */
        .story-container { display: flex; overflow-x: auto; padding: 15px 10px; border-bottom: 0.5px solid #262626; gap: 12px; scrollbar-width: none; }
        .story-container::-webkit-scrollbar { display: none; }
        .story-wrapper { text-align: center; width: 75px; flex-shrink: 0; }
        .story-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; margin: auto; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid black; object-fit: cover; }
        .story-wrapper span { font-size: 11px; display: block; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Feed Post */
        .post-card { border-bottom: 0.5px solid #262626; margin-bottom: 10px; width: 100%; max-width: 500px; margin: auto; }
        .post-header { display: flex; align-items: center; padding: 10px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .post-img { width: 100%; height: auto; max-height: 600px; object-fit: cover; }
        .post-actions { display: flex; padding: 12px; gap: 18px; font-size: 22px; }
        .post-info { padding: 0 12px 12px 12px; font-size: 14px; }
        .post-info b { cursor: pointer; }

        /* Bottom Navbar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .bottom-nav i { font-size: 22px; cursor: pointer; color: #fff; }

        /* Reels Snap Container */
        #reelsView { scroll-snap-type: y mandatory; }
        .reel-video-container { scroll-snap-align: start; }

        .modal-overlay {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;}
    </style>
</head>
<body>

<header id="mainHeader">Rollera</header>

<div id="auth">
    <h1 style="text-align: center; font-family: 'Brush Script MT', cursive; font-size: 45px; margin-bottom: 30px;">Rollera</h1>
    <input id="login-email" placeholder="Phone number, username, or email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Log in</button>
    <div style="margin-top: 20px; text-align: center; color: #8e8e8e; font-size: 14px;">
        Don't have an account? <span onclick="openSignup()" style="color: #0095f6; font-weight: bold; cursor: pointer;">Sign up</span>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="story-container">
        <div class="story-wrapper">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?u=me"></div>
            <span>Your story</span>
        </div>
        <div class="story-wrapper">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=1"></div>
            <span>himanshu_</span>
        </div>
        <div class="story-wrapper">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=2"></div>
            <span>sunil_sk</span>
        </div>
    </div>

    <div id="reelsContainer">
        <div class="post-card">
            <div class="post-header">
                <img src="https://i.pravatar.cc/150?img=3">
                <span style="font-weight: 600; font-size: 14px;">collectorbabu_</span>
            </div>
            <img class="post-img" src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80">
            <div class="post-actions">
                <i class="fa-regular fa-heart" onclick="toggleLike(this)"></i>
                <i class="fa-regular fa-comment"></i>
                <i class="fa-regular fa-paper-plane"></i>
            </div>
            <div class="post-info">
                <p><b>856 likes</b></p>
                <p><b>collectorbabu_</b> Bhai time lagega but Flex to isi car se karna hai' ❤️🔥</p>
            </div>
        </div>
    </div>

    <div id="reelsView" style="display:none; height: 100vh; background: #000; overflow-y: scroll; scrollbar-width: none; position: fixed; top: 0; left: 0; width: 100%; z-index: 999;">
        <div class="reel-video-container" style="height: 100vh; width: 100%; position: relative;">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted playsinline style="height: 100%; width: 100%; object-fit: cover;"></video>
            
            <div style="position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; font-size: 25px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">
                <div onclick="toggleLike(this.children[0])" style="text-align:center;"><i class="fa-regular fa-heart"></i><p style="font-size:12px;">1.2k</p></div>
                <div style="text-align:center;"><i class="fa-regular fa-comment"></i><p style="font-size:12px;">45</p></div>
                <div style="text-align:center;"><i class="fa-regular fa-paper-plane"></i></div>
            </div>

            <div style="position: absolute; left: 15px; bottom: 100px; width: 80%;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <img src="https://i.pravatar.cc/150?img=5" style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff;">
                    <span style="font-weight: bold;">himanshu_sk</span>
                    <button style="width: auto; padding: 5px 10px; margin: 0; font-size: 12px; background: transparent; border: 1px solid #fff;">Follow</button>
                </div>
                <p style="font-size: 14px;">Rollera par meri pehli Reel! 🔥 #trending #rollera</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <i class="fa-solid fa-house" onclick="showHome()"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus" onclick="document.getElementById('reelVideo').click()"></i>
        <i class="fa-solid fa-clapperboard" onclick="showReels()"></i>
        <i class="fa-regular fa-circle-user"></i>
    </div>

    <input type="file" id="reelVideo" accept="video/*" style="display:none;" onchange="uploadMyReel()">
</div>

<div id="signupModal" class="modal-overlay"> </div>

<script src="app.js"></script>
</body>
</html>
