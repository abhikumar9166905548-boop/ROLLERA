<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;background:#000;color:#fff;font-family:system-ui; overflow-x: hidden;}
        header{padding:20px;text-align:center;background:linear-gradient(90deg,#ff0050,#7f00ff);font-size:24px;font-weight:bold;}
        #auth, #app {padding:0px;} /* Feed ke liye padding hatayi */
        #auth {padding: 20px;}
        input, button {width:100%;padding:15px;margin-top:10px;border-radius:10px;border:none;box-sizing:border-box;}
        input {background:#111;color:#fff;border:1px solid #333;}
        button {background:#ff0050;color:#fff;font-weight:bold;cursor:pointer;}
        .modal-overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;}
        .modal-content {background:#000;width:90%;max-width:400px;padding:30px;border-radius:20px;border:1px solid #333;text-align:center;}
        
        /* Story Styling */
        .story-circle { flex-shrink: 0; cursor: pointer; padding: 5px; }
        .reel-card { background: #000; border-bottom: 0.5px solid #262626; margin-bottom: 10px; }
        video { width: 100%; display: block; background: #000; }
    </style>
</head>
<body>

<header id="mainHeader">🔥 Rollera</header>

<div id="auth">
    <h3>Login / Signup</h3>
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <button onclick="openSignup()" style="background:#333;margin-top:10px;">Create Account</button>
</div>

<div id="signupModal" class="modal-overlay">
    <div class="modal-content" style="background: #fff; color: #000; border-radius: 1px; border: 1px solid #dbdbdb; max-width: 350px;">
        <h1 style="font-family: 'Cookie', cursive; font-size: 40px; margin-bottom: 10px;">Rollera</h1>
        <p style="color: #8e8e8e; font-weight: 600; font-size: 17px; line-height: 20px; margin-bottom: 20px;">Sign up to see photos and videos from your friends.</p>
        
        <input id="signup-email" placeholder="Mobile number or email" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        <input id="signup-password" type="password" placeholder="Password" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        
        <div style="text-align: left; margin-top: 15px;">
            <label style="font-size: 12px; color: #8e8e8e;">Birthday ❓</label>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <select id="dob-month" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;"><option>Month</option></select>
                <select id="dob-day" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;"><option>Day</option></select>
                <select id="dob-year" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;"><option>Year</option></select>
            </div>
        </div>

        <input id="signup-name" placeholder="Full Name" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        <input id="signup-username" placeholder="Username" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">

        <button onclick="verifyAndSignup()" style="background: #0095f6; color: #fff; border-radius: 8px; padding: 7px; font-size: 14px; margin-top: 10px;">Sign up</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #dbdbdb; padding-top: 15px;">
            <p style="font-size: 14px;">Have an account? <a href="#" onclick="closeSignup()" style="color: #0095f6; font-weight: bold; text-decoration: none;">Log in</a></p>
        </div>
    </div>
</div>

<div id="app" style="display:none; background: #000; min-height: 100vh; padding-bottom: 60px;">
    
    <div style="display: flex; overflow-x: auto; padding: 10px; border-bottom: 0.5px solid #262626; gap: 15px; scrollbar-width: none;">
        <div class="story-circle" onclick="alert('Add Story')">
            <div style="width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0050; padding: 2px;">
                <img src="https://via.placeholder.com/65" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
            </div>
            <p style="font-size: 11px; text-align: center; margin-top: 5px;">Your story</p>
        </div>
        <div class="story-circle">
            <div style="width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0050; padding: 2px;">
                <img src="https://i.pravatar.cc/65?img=1" style="width: 100%; height: 100%; border-radius: 50%;">
            </div>
            <p style="font-size: 11px; text-align: center; margin-top: 5px;">himanshu_</p>
        </div>
        <div class="story-circle">
            <div style="width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff0050; padding: 2px;">
                <img src="https://i.pravatar.cc/65?img=2" style="width: 100%; height: 100%; border-radius: 50%;">
            </div>
            <p style="font-size: 11px; text-align: center; margin-top: 5px;">sunil_sk</p>
        </div>
    </div>

    <div id="reelsContainer">
        <div class="reel-card">
            <div style="display: flex; align-items: center; padding: 10px; gap: 10px;">
                <img src="https://i.pravatar.cc/32?img=3" style="width: 32px; height: 32px; border-radius: 50%;">
                <span style="font-weight: 600; font-size: 14px;">collectorbabu_</span>
            </div>
            <img src="https://via.placeholder.com/500x600" style="width: 100%; display: block;">
            <div style="padding: 12px;">
                <div style="display: flex; gap: 15px; margin-bottom: 8px; font-size: 20px;">
                    <span style="cursor:pointer">❤️</span> <span style="cursor:pointer">💬</span> <span style="cursor:pointer">✈️</span>
                </div>
                <p style="font-size: 14px; margin: 0;"><b>856 likes</b></p>
                <p style="font-size: 14px; margin: 5px 0;"><b>collectorbabu_</b> Bhai time lagega but Flex to isi car se karna hai' ❤️🔥</p>
            </div>
        </div>
    </div>

    <div style="position: fixed; bottom: 0; width: 100%; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000;">
        <span onclick="loadFeed()" style="font-size: 24px; cursor: pointer;">🏠</span>
        <span style="font-size: 24px; cursor: pointer;">🔍</span>
        <span onclick="document.getElementById('reelVideo').click()" style="font-size: 24px; cursor: pointer;">➕</span>
        <span style="font-size: 24px; cursor: pointer;">🎬</span>
        <span onclick="alert('Profile Page')" style="font-size: 24px; cursor: pointer;">👤</span>
    </div>

    <input type="file" id="reelVideo" accept="video/*" style="display:none;" onchange="uploadMyReel()">
</div>

<script src="app.js"></script>
</body>
</html>
