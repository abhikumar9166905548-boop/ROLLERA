<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
        
        /* Header */
        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 0.5px solid #262626; position: sticky; top: 0; background: #000; z-index: 100; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 28px; }

        /* Stories Section */
        .stories { display: flex; overflow-x: auto; padding: 15px 10px; gap: 12px; border-bottom: 0.5px solid #262626; scrollbar-width: none; }
        .stories::-webkit-scrollbar { display: none; }
        .story-circle { min-width: 70px; text-align: center; font-size: 11px; }
        .ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #e6683c, #cc2366, #bc1888); padding: 2.5px; margin-bottom: 5px; }
        .ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }

        /* Post Section */
        .post { width: 100%; margin-bottom: 20px; }
        .post-header { display: flex; align-items: center; padding: 10px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; }
        .post-img { width: 100%; min-height: 300px; background: #121212; display: block; object-fit: cover; }
        .post-actions { padding: 10px; display: flex; gap: 15px; font-size: 22px; }
        .post-caption { padding: 0 10px; font-size: 14px; }
        .post-caption b { margin-right: 5px; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        nav i { font-size: 24px; cursor: pointer; }

        /* Hidden Sections */
        #profile-view, #upload-modal { display: none; }
        #upload-modal { position: fixed; top: 0; background: rgba(0,0,0,0.9); width: 100%; height: 100%; z-index: 2000; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">Rollera</div>
    <div class="header-icons"><i class="fa-regular fa-heart"></i> <i class="fa-regular fa-paper-plane" style="margin-left:15px;"></i></div>
</header>

<div id="home-view">
    <div class="stories" id="story-list">
        <div class="story-circle"><div class="ring"><img src="https://i.pravatar.cc/150?u=1"></div><span>mr.abhi_01</span></div>
        <div class="story-circle"><div class="ring"><img src="https://i.pravatar.cc/150?u=2"></div><span>rahul_88</span></div>
        <div class="story-circle"><div class="ring"><img src="https://i.pravatar.cc/150?u=3"></div><span>deepak_kd</span></div>
    </div>

    <div id="feed">
        <div class="post">
            <div class="post-header"><img src="https://i.pravatar.cc/150?u=1"> <b>mr.abhi_01</b></div>
            <img class="post-img" src="https://picsum.photos/600/600" alt="Post">
            <div class="post-actions"><i class="fa-regular fa-heart"></i> <i class="fa-regular fa-comment"></i> <i class="fa-regular fa-paper-plane"></i></div>
            <div class="post-caption"><b>mr.abhi_01</b> Holi ki hardik shubhkamnaye! 🎨</div>
        </div>
    </div>
</div>

<div id="profile-view" style="padding:20px; text-align:center;">
    <img src="https://i.pravatar.cc/150?u=1" style="width:100px; border-radius:50%; margin-bottom:10px;">
    <h2>mr.abhi_01</h2>
    <p>25 posts • 571 followers</p>
</div>

<nav>
    <i class="fa-solid fa-house" onclick="changeTab('home')"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-regular fa-square-plus" onclick="toggleUpload()"></i>
    <i class="fa-solid fa-clapperboard"></i>
    <i class="fa-regular fa-circle-user" onclick="changeTab('profile')"></i>
</nav>

<div id="upload-modal" onclick="toggleUpload()">
    <div style="background:#262626; padding:20px; border-radius:10px;" onclick="event.stopPropagation()">
        <h3>Select Photo</h3>
        <input type="file" id="photoFile" style="margin:15px 0;">
        <button style="width:100%; background:#0095f6; color:#fff; border:none; padding:10px; border-radius:5px; font-weight:bold;">Share</button>
    </div>
</div>

<script>
    // FIX: Avoid "Identifier already declared" error
    if (typeof API_URL === 'undefined') {
        var API_URL = "https://rollera.onrender.com";
    }

    function changeTab(tab) {
        document.getElementById('home-view').style.display = (tab === 'home') ? 'block' : 'none';
        document.getElementById('profile-view').style.display = (tab === 'profile') ? 'block' : 'none';
    }

    function toggleUpload() {
        const modal = document.getElementById('upload-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
</script>

</body>
</html>
