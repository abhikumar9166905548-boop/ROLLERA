<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;background:#000;color:#fff;font-family:system-ui;}
        header{padding:20px;text-align:center;background:linear-gradient(90deg,#ff0050,#7f00ff);font-size:24px;font-weight:bold;}
        #auth, #app {padding:20px;}
        input, button {width:100%;padding:15px;margin-top:10px;border-radius:10px;border:none;box-sizing:border-box;}
        input {background:#111;color:#fff;border:1px solid #333;}
        button {background:#ff0050;color:#fff;font-weight:bold;cursor:pointer;}
        .modal-overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;}
        .modal-content {background:#000;width:90%;max-width:400px;padding:30px;border-radius:20px;border:1px solid #333;text-align:center;}
    </style>
</head>
<body>

<header>🔥 Rollera</header>

<div id="auth">
    <h3>Login / Signup</h3>
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <button onclick="openSignup()" style="background:#333;margin-top:10px;">Create Account</button>
</div>

<div id="signupModal" class="modal-overlay">
    <div class="modal-content" style="background: #fff; color: #000; border-radius: 1px; border: 1px solid #dbdbdb; max-width: 350px;">
        <h1 style="font-family: 'Cookie', cursive; font-size: 40px; margin-bottom: 10px;">Rollera</h1>
        <p style="color: #8e8e8e; font-weight: 600; font-size: 17px; line-height: 20px; margin-bottom: 20px;">
            Sign up to see photos and videos from your friends.
        </p>
        
        <input id="signup-email" placeholder="Mobile number or email" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        <input id="signup-password" type="password" placeholder="Password" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        
        <div style="text-align: left; margin-top: 15px;">
            <label style="font-size: 12px; color: #8e8e8e;">Birthday <span style="cursor:help;">❓</span></label>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <select id="dob-month" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;">
                    <option>Month</option><option value="1">January</option><option value="2">February</option>
                </select>
                <select id="dob-day" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;">
                    <option>Day</option>
                </select>
                <select id="dob-year" style="flex: 1; padding: 5px; border: 1px solid #dbdbdb; background: #fafafa;">
                    <option>Year</option>
                </select>
            </div>
        </div>

        <input id="signup-name" placeholder="Full Name" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">
        <input id="signup-username" placeholder="Username" style="background: #fafafa; border: 1px solid #dbdbdb; color: #262626;">

        <p style="font-size: 12px; color: #8e8e8e; margin: 15px 0;">
            People who use our service may have uploaded your contact information to Rollera. <a href="#" style="text-decoration: none; color: #00376b;">Learn more</a>.
        </p>

        <button onclick="verifyAndSignup()" style="background: #0095f6; color: #fff; border-radius: 8px; padding: 7px; font-size: 14px; margin-top: 0;">Sign up</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #dbdbdb; padding-top: 15px;">
            <p style="font-size: 14px;">Have an account? <a href="#" onclick="closeSignup()" style="color: #0095f6; text-weight: bold; text-decoration: none;">Log in</a></p>
        </div>
    </div>
</div>

<div id="app" style="display:none;">
    <h2 style="text-align:center;">Welcome to Rollera Feed!</h2>
    <button onclick="localStorage.clear(); location.reload()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
